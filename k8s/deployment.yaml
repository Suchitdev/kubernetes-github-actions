apiVersion: apps/v1
kind: Deployment

metadata:
  name: kubernetes-dashboard

spec:
  replicas: 2

  selector:
    matchLabels:
      app: kubernetes-dashboard

  template:
    metadata:
      labels:
        app: kubernetes-dashboard

    spec:
      containers:
      - name: kubernetes-dashboard

        image: suchit10/kubernetes-github-actions:latest

        imagePullPolicy: Always

        ports:
        - containerPort: 5000