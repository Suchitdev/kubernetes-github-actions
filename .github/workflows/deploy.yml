name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build, Push and Deploy
    runs-on: self-hosted

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Show Repository Files
        run: ls -la

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: suchit10/kubernetes-github-actions:latest

      - name: Update Kubernetes Deployment
        run: |
          kubectl set image deployment/kubernetes-dashboard \
          kubernetes-dashboard=suchit10/kubernetes-github-actions:latest

      - name: Wait for Rollout to Complete
        run: |
          kubectl rollout status deployment/kubernetes-dashboard